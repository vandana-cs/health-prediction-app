
<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="container mt-5">

<h2>Edit Patient</h2>

<form method="POST">

    <input type="text"
           name="full_name"
           class="form-control mb-3"
           value="{{ patient[1] }}"
           required>

    <input type="date"
           name="dob"
           class="form-control mb-3"
           value="{{ patient[2] }}"
           required>

    <input type="email"
           name="email"
           class="form-control mb-3"
           value="{{ patient[3] }}"
           required>

    <input type="number"
           step="0.1"
           name="glucose"
           class="form-control mb-3"
           value="{{ patient[4] }}"
           required>

    <input type="number"
           step="0.1"
           name="haemoglobin"
           class="form-control mb-3"
           value="{{ patient[5] }}"
           required>

    <input type="number"
           step="0.1"
           name="cholesterol"
           class="form-control mb-3"
           value="{{ patient[6] }}"
           required>

    <button class="btn btn-success">
        Update Patient
    </button>

    
<a href="/" class="btn btn-secondary mt-3">
    Back to Dashboard
</a>



</form>

</body>

</html>
